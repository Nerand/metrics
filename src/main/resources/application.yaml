spring:
  application:
    name: performance-demo

  cache:
    type: redis
    caffeine:
      spec: maximumSize=100,expireAfterWrite=10m

  datasource:
    url: jdbc:postgresql://localhost:5432/perfdb
    username: postgres
    password: pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    mongodb:
      uri: mongodb://localhost:27017/perfdb
    redis:
      host: localhost
      port: 6379
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,threaddump,heapdump